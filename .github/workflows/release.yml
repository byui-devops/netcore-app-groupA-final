name: Release to AWS

on:
  workflow_run:
    workflows: ["Build, Test & Push"]
    types: [completed]
    branches: [main]

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      TF_VAR_docker_image: "${{ secrets.DOCKERHUB_USERNAME }}/netcore-contoso-university:latest"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Import existing security group
        working-directory: ./terraform
        run: |
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=contoso-university-sg" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "None")
          if [ "$SG_ID" != "None" ] && [ "$SG_ID" != "" ] && [ "$SG_ID" != "null" ]; then
            terraform import aws_security_group.app_sg $SG_ID || true
          fi

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Output EC2 URL
        working-directory: ./terraform
        run: |
          echo "EC2 Public DNS: $(terraform output -raw app_url 2>/dev/null || echo 'not available')"
          echo "EC2 Public IP: $(terraform output -raw ec2_public_ip 2>/dev/null || echo 'not available')"
