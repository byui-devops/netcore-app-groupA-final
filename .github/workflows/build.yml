name: Build, Test & Push

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore NetCoreContosoUniversityApp.slnx

      - name: Build solution
        run: dotnet build NetCoreContosoUniversityApp.slnx --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test src/Testing/NetCoreContosoUniversityApp.Testing.Unit/NetCoreContosoUniversityApp.Testing.Unit.csproj \
            --configuration Release \
            --logger "trx;LogFileName=unit-results.trx"

      - name: Run integration tests
        run: |
          dotnet test src/Testing/NetCoreContosoUniversityApp.Testing.Integration/NetCoreContosoUniversityApp.Testing.Integration.csproj \
            --configuration Release \
            --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netcore-contoso-university:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/netcore-contoso-university:${{ github.sha }}
